name: Node.js build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Top-level: read-only
permissions:
  contents: read

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build --if-present
      - run: npm run lint

  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    # Job-level write permissions (allowed)
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build --if-present

      - name: Generate provenance attestation for main.js
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: main.js
          subject-path: main.js

      - name: Generate provenance attestation for style.css
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: style.css
          subject-path: style.css

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: |
            main.js
            style.css
            manifest.json
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
